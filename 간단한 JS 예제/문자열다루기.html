<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Page Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<p>
strings함수는 문자열 s를 매개변수로 입력받습니다.<br/>
s의 길이가 4혹은 6이고, 숫자로만 구성되있는지 확인해주는 함수를 완성하세요.<br/>
예를들어 s가 a234이면 False를 리턴하고 1234라면 True를 리턴하면 됩니다<br/>
<br/>
<br/>
</p>


<label for='name'>숫자나 문자입력</label>
<input class='input'>
<button class='submit'>결과</button>
<p class='para'></p>

<script>
var para=document.querySelector('.para');
var inputbox=document.querySelector('.input');
var btn=document.querySelector('.submit');

 function strings(s) {
     var result=true;

     if((isNaN(s)===false)&&(s.length===4||s.length===6)){
         result=true;
     } else {
         result=false;
     }
     return result;
 }

btn.addEventListener('click',function(){
var final= strings(inputbox.value);
para.textContent= '결과값은 '+final+' 입니다';
})
</script>
</body>
</html>

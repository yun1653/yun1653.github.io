<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>평균값 구하기</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<p>
        함수를 완성해서 매개변수 array의 평균값을 return하도록 만들어 보세요.<br/>
        어떠한 크기의 array가 와도 평균값을 구할 수 있어야 합니다.<br/>
<br/>
<br/>
</p>


<label for='name'>숫자들 ,로 분리해서 입력</label>
<input class='input'>
<button class='submit'>결과</button>
<p class='para'></p>

<script>
var para=document.querySelector('.para');
var inputbox=document.querySelector('.input');
var btn=document.querySelector('.submit');

 function average(s) {
     var result=0;
     var sum=0;
    for(var i=0;i<s.length;i++){
        sum += Number(s[i]);
    }
    result=sum/s.length;
    return result;
 }


btn.addEventListener('click',function(){
    var tem=inputbox.value.split(',');
    
    var final= average(tem);
para.textContent= '결과값은 '+final+' 입니다';
})
</script>
</body>
</html>

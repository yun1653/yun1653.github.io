<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>짝수 홀수 구하기</title>
</head>
<body>
<h1>
       짝수 홀수 구하기.<br/>
</h1>


<label for='name'>정수를 입력하세요</label>
<input class='input'>
<button class='submit'>결과</button>
<p class='para'></p>

<script>
var para=document.querySelector('.para');
var inputbox=document.querySelector('.input');
var btn=document.querySelector('.submit');

 function evenOrOdd(s) {
     var result=0;
    if (s%2===0){
        result='짝수';
    } else if(s%2===1) {
        result='홀수';
    } else {
        result='정수를 입력하세요';
    }
     return result;
 }


btn.addEventListener('click',function(){
    var tem=inputbox.value;
    var final= evenOrOdd(tem);
para.textContent= '결과:  '+final;
})
</script>
</body>
</html>

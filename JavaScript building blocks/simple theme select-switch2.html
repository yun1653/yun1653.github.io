<html>
    <head></head>
    <body>
        <label for="theme">Select Theme:</label>
        <select id="theme">
            <option value="white">White</option>
            <option value="black">Black</option>
            <option value="purple">Purple</option>
            <option value="yellow">Yellow</option>
            <option value="psychedelic">Psychedelic</option>
        </select>
        <h1>This is my website</h1>

        <script>
        var select=document.querySelector('select');
        var html=document.querySelector('html')
        document.body.style.padding='40px';
        
      
        select.onchange=function(){
            var choice=select.value;
            switch(choice){
                case 'white' : update(choice,'black'); break;
                case 'black' : update(choice,'white'); break;
                case 'purple' : update(choice,'white'); break;
                case 'yellow' : update(choice,'black'); break;
                case 'psychedelic' : update('lime','purple');break;
                default: 
            }
        }

        function update(bgColor,textColor){
            html.style.background=bgColor;
            html.style.color=textColor;
        }

        </script>
    </body>
</html>

<!DOCTYPE html>
<html>
    <head>
        <meta charset='utf-8'>
    </head>
    <body>
        <div>
            <label for='jscode'>Enter code:</label>
            <input type="text" id="jscode">
            <button>Submit code</button>
        </div>

        <p></p>
    </body>
        <script>
            var input=document.querySelector('input');
            var btn=document.querySelector('button');
            var para=document.querySelector('p');

            btn.onclick=function(){
                var code=input.value;
                para.textContent=eval(code);
            }

            function Person(first,last,age,gender,interests){
                this.name={first,last};
                this.age=age;
                this.gender=gender;
                this.interests=interests;
                
                this.bio=function(){
                
                var string=this.name.first+' '+this.name.last+' '+'is '+this.age+' years old. ';
                
                // Check what the value of gender is
                if (gender==='male'){
                    string +='He likes ';
                } else {string +='She likes ';}

                //Check  number of interests
                if (this.interests.length===1){
                    string += this.interests+'.';
                } else {
                for (i=0;i<this.interests.length;i++){
                    if (i===this.interests.length-1){
                        string += this.interests[i]+'.';
                    } else {
                    string += this.interests[i] + ' and ';
                }
                }
                }

                    alert(string);
                };
                
            }
            var person1=new Person('Bob','Smith',32,'male',['Skiing','movie','Tennis']);
            var person2=new Person('Marry','PKm',50,'female',['computer']);
            
            Person.prototype.greeting=function(){
                alert('Hi I\'m '+this.name.first+'.');
            };
            Person.prototype.farewell=function() {
                alert(this.name.first+' has left the building. Bye for now!');
            };

            function Teacher(first,last,age,gender,interests,subject){
                Person.call(this,first,last,age,gender,interests);
                this.subject=subject;
            }
            
            Teacher.prototype=Object.create(Person.prototype);
            Teacher.prototype.constructor=Teacher;

            Teacher.prototype.greeting=function(){
                var prefix;

                if(this.gender==='male'||this.gender==='Male'||this.gender==='M'||this.gender==='m'){
                    prefix='Mr.';
                } else if(this.gender==='female'||this.gender==='Female'||this.gender==='f'||this.gender==='F'){
                    prefix='Mrs.';
                } else {prefix='Mx.';}
                alert('Hello. My name is '+prefix+' '+this.name.last+', and I teach '+this.subject+'.');
            };

            var teacher1=new Teacher('Dave','Griffiths',35,'male',['football','cooker'],'mathematics');
            
            function Student(first,last,age,gender,interest,region){
                Person.call(this,first,last,age,gender,interest);
                this.region=region;
            }
            Student.prototype=Object.create(Person.prototype);
            Student.prototype.constructor=Student;
            Student.prototype.greeting = function() {
                alert('Yo! I\'m ' + this.name.first + '.');
                };
            var student1 = new Student('Liz', 'Sheppard', 17, 'female', ['ninjitsu', 'air cadets']);
        </script>
</html>
